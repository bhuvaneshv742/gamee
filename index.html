<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plumber Jump — Platform Adventure</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(#5c94fc, #a3d9ff);
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #gameWrap {
    position: relative;
    box-shadow: 0 0 0 4px #222, 0 0 30px rgba(0,0,0,0.5);
    border-radius: 4px;
    overflow: hidden;
  }
  canvas {
    display: block;
    background: linear-gradient(#5c94fc 60%, #7ec8ff 100%);
    image-rendering: pixelated;
  }
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 10px 16px;
    color: white;
    font-weight: bold;
    font-size: 16px;
    text-shadow: 2px 2px 0 #000;
    pointer-events: none;
    letter-spacing: 1px;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    color: white;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-family: 'Courier New', monospace;
  }
  #overlay h1 {
    font-size: 32px;
    margin-bottom: 10px;
    text-shadow: 3px 3px 0 #d62828;
  }
  #overlay p { margin-bottom: 20px; font-size: 14px; opacity: 0.85; }
  #overlay button {
    background: #fbbc04;
    border: 3px solid #222;
    color: #222;
    padding: 10px 24px;
    font-weight: bold;
    font-size: 16px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 4px;
    box-shadow: 0 4px 0 #b8860b;
  }
  #overlay button:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #b8860b;
  }
  #instructions {
    margin-top: 12px;
    color: #333;
    font-size: 13px;
    text-align: center;
    max-width: 640px;
    line-height: 1.6;
  }
  #instructions b { color: #d62828; }
</style>
</head>
<body>

<div id="gameWrap">
  <canvas id="game" width="800" height="450"></canvas>
  <div id="hud">
    <div>❤️ <span id="lives">3</span> &nbsp;&nbsp; 🪙 <span id="coins">0</span></div>
    <div>SCORE: <span id="score">0</span></div>
    <div>WORLD 1-1</div>
  </div>
  <div id="overlay">
    <h1 id="overlayTitle">Game Over</h1>
    <p id="overlayText">Better luck next time!</p>
    <button id="restartBtn">Restart</button>
  </div>
</div>

<div id="instructions">
  <b>Arrow keys / A,D</b> to move &nbsp;|&nbsp; <b>Space / W / Up</b> to jump &nbsp;|&nbsp;
  Stomp enemies from above, avoid them from the side, grab coins, reach the flag!
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const GRAVITY = 0.55;
  const TILE = 40;

  const livesEl = document.getElementById('lives');
  const coinsEl = document.getElementById('coins');
  const scoreEl = document.getElementById('score');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayText = document.getElementById('overlayText');
  const restartBtn = document.getElementById('restartBtn');

  // ---- Level Layout ----
  // Symbols: G=ground, B=brick, ?=coin block, P=pipe, F=flagpole
  const levelWidth = 3200;
  const groundY = H - TILE * 2;

  function buildLevel() {
    return {
      platforms: [
        // ground segments (with a couple of gaps/pits)
        {x:0, y:groundY, w:900, h:TILE*2},
        {x:980, y:groundY, w:500, h:TILE*2},
        {x:1560, y:groundY, w:700, h:TILE*2},
        {x:2340, y:groundY, w:860, h:TILE*2},

        // floating platforms
        {x:300, y:groundY-140, w:120, h:20},
        {x:520, y:groundY-220, w:120, h:20},
        {x:760, y:groundY-140, w:120, h:20},
        {x:1100, y:groundY-160, w:160, h:20},
        {x:1650, y:groundY-180, w:120, h:20},
        {x:1850, y:groundY-260, w:120, h:20},
        {x:2050, y:groundY-180, w:120, h:20},
        {x:2500, y:groundY-160, w:140, h:20},
        {x:2750, y:groundY-260, w:120, h:20},

        // pipes (obstacles)
        {x:1350, y:groundY-60, w:60, h:60, pipe:true},
        {x:2200, y:groundY-80, w:60, h:80, pipe:true},
      ],
      coins: [
        {x:340,y:groundY-180}, {x:380,y:groundY-180},
        {x:560,y:groundY-260}, {x:600,y:groundY-260},
        {x:800,y:groundY-180},
        {x:1120,y:groundY-200}, {x:1160,y:groundY-200}, {x:1200,y:groundY-200},
        {x:1690,y:groundY-220},
        {x:1890,y:groundY-300}, {x:1930,y:groundY-300},
        {x:2540,y:groundY-200}, {x:2580,y:groundY-200},
        {x:2790,y:groundY-300},
      ],
      enemies: [
        {x:650, y:groundY-32, dir:-1, range:[550,900]},
        {x:1650, y:groundY-32, dir:1, range:[1560,1900]},
        {x:2000, y:groundY-32, dir:-1, range:[1980,2250]},
        {x:2600, y:groundY-32, dir:1, range:[2450,2800]},
      ],
      flag: {x: levelWidth-120, y: groundY-320, h:320},
      start: {x:60, y:groundY-64}
    };
  }

  let level = buildLevel();

  // ---- Player ----
  function newPlayer() {
    return {
      x: level.start.x, y: level.start.y, w:28, h:36,
      vx:0, vy:0, onGround:false, facing:1,
      alive:true, invincible:0
    };
  }

  let player = newPlayer();
  let camX = 0;
  let lives = 3, coinCount = 0, score = 0;
  let keys = {};
  let gameState = 'playing'; // playing, won, dead
  let animTimer = 0;

  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  });
  window.addEventListener('keyup', e => keys[e.code] = false);

  function rectsOverlap(a,b) {
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  }

  function resetLevel(fullReset) {
    level = buildLevel();
    player = newPlayer();
    camX = 0;
    if (fullReset) { lives = 3; coinCount = 0; score = 0; }
    gameState = 'playing';
    overlay.style.display = 'none';
    updateHud();
  }

  function updateHud() {
    livesEl.textContent = lives;
    coinsEl.textContent = coinCount;
    scoreEl.textContent = score;
  }

  function killPlayer() {
    if (!player.alive) return;
    player.alive = false;
    lives--;
    updateHud();
    setTimeout(() => {
      if (lives <= 0) {
        gameState = 'dead';
        overlayTitle.textContent = 'Game Over';
        overlayText.textContent = `Final Score: ${score}`;
        overlay.style.display = 'flex';
      } else {
        player = newPlayer();
        camX = 0;
      }
    }, 700);
  }

  function winLevel() {
    gameState = 'won';
    overlayTitle.textContent = 'Level Complete!';
    overlayText.textContent = `Score: ${score} — Coins: ${coinCount}`;
    overlay.style.display = 'flex';
  }

  restartBtn.addEventListener('click', () => resetLevel(true));

  function update() {
    if (gameState !== 'playing' || !player.alive) return;

    // horizontal movement
    const speed = 4.2;
    if (keys['ArrowLeft'] || keys['KeyA']) { player.vx = -speed; player.facing = -1; }
    else if (keys['ArrowRight'] || keys['KeyD']) { player.vx = speed; player.facing = 1; }
    else player.vx *= 0.75;

    // jump
    if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.onGround) {
      player.vy = -11.5;
      player.onGround = false;
    }

    player.vy += GRAVITY;
    if (player.vy > 14) player.vy = 14;

    // move X and resolve collisions
    player.x += player.vx;
    player.onGround = false;
    for (const p of level.platforms) {
      if (rectsOverlap(player, p)) {
        if (player.vx > 0) player.x = p.x - player.w;
        else if (player.vx < 0) player.x = p.x + p.w;
      }
    }

    // move Y and resolve collisions
    player.y += player.vy;
    for (const p of level.platforms) {
      if (rectsOverlap(player, p)) {
        if (player.vy > 0) {
          player.y = p.y - player.h;
          player.vy = 0;
          player.onGround = true;
        } else if (player.vy < 0) {
          player.y = p.y + p.h;
          player.vy = 0;
        }
      }
    }

    // fell in a pit
    if (player.y > H + 100) killPlayer();

    // clamp to level bounds
    if (player.x < 0) player.x = 0;
    if (player.x > levelWidth - player.w) player.x = levelWidth - player.w;

    // camera follow
    camX = Math.max(0, Math.min(player.x - W/2 + player.w/2, levelWidth - W));

    // coins
    for (let i = level.coins.length-1; i >= 0; i--) {
      const c = level.coins[i];
      const cBox = {x:c.x-10,y:c.y-10,w:20,h:20};
      const pBox = {x:player.x,y:player.y,w:player.w,h:player.h};
      if (rectsOverlap(pBox, cBox)) {
        level.coins.splice(i,1);
        coinCount++;
        score += 100;
        updateHud();
      }
    }

    // enemies
    for (const e of level.enemies) {
      if (!e.dead) {
        e.x += e.dir * 1.4;
        if (e.x < e.range[0] || e.x > e.range[1]) e.dir *= -1;

        const eBox = {x:e.x, y:e.y, w:30, h:32};
        const pBox = {x:player.x,y:player.y,w:player.w,h:player.h};
        if (rectsOverlap(pBox, eBox)) {
          const playerBottom = player.y + player.h;
          const fallingOnTop = player.vy > 0 && playerBottom - eBox.h/2 < eBox.y + 14;
          if (fallingOnTop) {
            e.dead = true;
            player.vy = -8;
            score += 200;
            updateHud();
          } else if (player.invincible <= 0) {
            killPlayer();
          }
        }
      }
    }
    level.enemies = level.enemies.filter(e => !e.dead || (e.deadTimer = (e.deadTimer||0)+1) < 20);
    if (player.invincible > 0) player.invincible--;

    // flag / win
    const flagBox = {x: level.flag.x, y: level.flag.y, w:20, h: level.flag.h};
    if (rectsOverlap({x:player.x,y:player.y,w:player.w,h:player.h}, flagBox)) {
      score += 500;
      updateHud();
      winLevel();
    }

    animTimer++;
  }

  // ---- Drawing ----
  function drawGround(p) {
    ctx.fillStyle = '#8b5a2b';
    ctx.fillRect(p.x - camX, p.y, p.w, p.h);
    ctx.fillStyle = '#3ca832';
    ctx.fillRect(p.x - camX, p.y, p.w, 10);
    // brick texture
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    for (let bx = 0; bx < p.w; bx += 20) {
      ctx.beginPath();
      ctx.moveTo(p.x - camX + bx, p.y+10);
      ctx.lineTo(p.x - camX + bx, p.y + p.h);
      ctx.stroke();
    }
  }

  function drawPlatform(p) {
    ctx.fillStyle = '#c97b3d';
    ctx.fillRect(p.x - camX, p.y, p.w, p.h);
    ctx.fillStyle = '#e8a05c';
    ctx.fillRect(p.x - camX, p.y, p.w, 5);
  }

  function drawPipe(p) {
    ctx.fillStyle = '#2ea043';
    ctx.fillRect(p.x - camX, p.y, p.w, p.h);
    ctx.fillStyle = '#3ca832';
    ctx.fillRect(p.x - camX - 6, p.y, p.w+12, 16);
    ctx.strokeStyle = '#1b5e20';
    ctx.lineWidth = 2;
    ctx.strokeRect(p.x - camX, p.y, p.w, p.h);
  }

  function drawCoin(c) {
    const bob = Math.sin(animTimer*0.15 + c.x) * 3;
    ctx.save();
    ctx.translate(c.x - camX, c.y + bob);
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.ellipse(0,0, 9, 10, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#b8860b';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  function drawEnemy(e) {
    const sx = e.x - camX;
    if (e.dead) {
      ctx.save();
      ctx.translate(sx+15, e.y+16);
      ctx.scale(1, 0.2);
      ctx.fillStyle = '#7b4b2a';
      ctx.beginPath();
      ctx.ellipse(0,0,15,16,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
      return;
    }
    ctx.fillStyle = '#8b4513';
    ctx.beginPath();
    ctx.ellipse(sx+15, e.y+18, 15, 14, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#5c2e0e';
    ctx.fillRect(sx+2, e.y+4, 26, 10);
    // eyes
    ctx.fillStyle = 'white';
    ctx.fillRect(sx+5, e.y+8, 5, 5);
    ctx.fillRect(sx+18, e.y+8, 5, 5);
    ctx.fillStyle = 'black';
    ctx.fillRect(sx + (e.dir>0?20:7), e.y+10, 2, 2);
    // feet
    ctx.fillStyle = '#3d1f08';
    ctx.fillRect(sx+2, e.y+30, 8, 6);
    ctx.fillRect(sx+20, e.y+30, 8, 6);
  }

  function drawPlayer() {
    if (!player.alive) return;
    const sx = player.x - camX;
    const flicker = player.invincible > 0 && Math.floor(animTimer/4)%2===0;
    if (flicker) return;

    ctx.save();
    ctx.translate(sx + player.w/2, player.y + player.h/2);
    ctx.scale(player.facing, 1);
    ctx.translate(-player.w/2, -player.h/2);

    // legs (simple walk animation)
    const walking = Math.abs(player.vx) > 0.5 && player.onGround;
    const legOffset = walking ? Math.sin(animTimer*0.3)*4 : 0;
    ctx.fillStyle = '#1e3a8a';
    ctx.fillRect(4, 26+Math.max(0,legOffset), 8, 10);
    ctx.fillRect(16, 26+Math.max(0,-legOffset), 8, 10);

    // body
    ctx.fillStyle = '#d62828';
    ctx.fillRect(2, 12, 24, 16);
    // overalls
    ctx.fillStyle = '#1e3a8a';
    ctx.fillRect(2, 18, 24, 10);
    // head
    ctx.fillStyle = '#f5c28e';
    ctx.fillRect(4, 0, 20, 14);
    // cap
    ctx.fillStyle = '#d62828';
    ctx.fillRect(2, -4, 24, 8);
    ctx.fillRect(16, 2, 12, 4);
    // mustache & eye
    ctx.fillStyle = '#3d2314';
    ctx.fillRect(10, 8, 10, 3);
    ctx.fillStyle = 'black';
    ctx.fillRect(18, 4, 3, 3);

    ctx.restore();
  }

  function drawFlag() {
    const sx = level.flag.x - camX;
    ctx.fillStyle = '#888';
    ctx.fillRect(sx+8, level.flag.y, 4, level.flag.h);
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(sx+12, level.flag.y+10);
    ctx.lineTo(sx+40, level.flag.y+20);
    ctx.lineTo(sx+12, level.flag.y+30);
    ctx.closePath();
    ctx.fill();
  }

  function drawBackground() {
    ctx.fillStyle = '#5c94fc';
    ctx.fillRect(0,0,W,H);
    // parallax clouds
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    for (let i=0;i<6;i++) {
      const cx = ((i*400 - camX*0.3) % (levelWidth+400)) - 200;
      const cy = 50 + (i%3)*30;
      cloud(cx, cy);
    }
    // hills
    ctx.fillStyle = '#3ca832';
    for (let i=0;i<8;i++) {
      const hx = ((i*350 - camX*0.6) % (levelWidth+350));
      ctx.beginPath();
      ctx.arc(hx, groundY+20, 60, Math.PI, 0);
      ctx.fill();
    }
  }

  function cloud(x,y) {
    ctx.beginPath();
    ctx.arc(x, y, 18, 0, Math.PI*2);
    ctx.arc(x+20, y-8, 22, 0, Math.PI*2);
    ctx.arc(x+42, y, 18, 0, Math.PI*2);
    ctx.fill();
  }

  function draw() {
    drawBackground();
    for (const p of level.platforms) {
      if (p.x - camX > W || p.x - camX + p.w < 0) continue;
      if (p.pipe) drawPipe(p);
      else if (p.y >= groundY) drawGround(p);
      else drawPlatform(p);
    }
    for (const c of level.coins) drawCoin(c);
    for (const e of level.enemies) drawEnemy(e);
    drawFlag();
    drawPlayer();
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  updateHud();
  loop();
})();
</script>
</body>
</html>
